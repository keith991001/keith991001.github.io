---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  {% if page.cover %}
  <img class="post-cover" src="{{ page.cover | relative_url }}" alt="{{ page.title }}" />
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
