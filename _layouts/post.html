---
layout: default
---
<div class="reading-progress" aria-hidden="true"></div>

<div class="post-layout">
  <article class="post">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-meta">
        <span class="post-meta-published">{{ page.date | date: "%B %-d, %Y" }}</span>
        {%- if page.updated and page.updated != page.date -%}
        <span class="post-meta-sep">·</span>
        <span class="post-meta-updated">更新于 {{ page.updated | date: "%B %-d, %Y" }}</span>
        {%- endif -%}
      </p>
    </header>
    {% if page.cover %}
    <img class="post-cover" src="{{ page.cover | relative_url }}" alt="{{ page.title }}" />
    {% endif %}
    <div class="post-content">
      {{ content }}
    </div>
  </article>

  <aside class="post-toc" aria-label="Table of contents" data-max-level="{{ page.toc_max_level | default: 5 }}">
    <div class="post-toc-head">
      <h2 class="post-toc-title">目录</h2>
      <button class="toc-collapse" type="button" aria-label="收起目录" title="收起目录">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 3L5 8l5 5"/>
        </svg>
      </button>
    </div>
    <nav id="toc"></nav>
  </aside>
</div>

<button class="toc-expand" type="button" aria-label="展开目录" title="展开目录" hidden>
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3l5 5-5 5"/>
  </svg>
</button>

<button class="toc-toggle" type="button" aria-label="目录" aria-expanded="false" aria-controls="toc" hidden>
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <line x1="4" y1="6" x2="16" y2="6" />
    <line x1="4" y1="10" x2="16" y2="10" />
    <line x1="4" y1="14" x2="12" y2="14" />
  </svg>
</button>

<button class="back-to-top" type="button" aria-label="回到顶部" hidden>
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 15V5M5 10l5-5 5 5" />
  </svg>
</button>

<div class="toc-backdrop" hidden></div>

<script>
  (function () {
    // Cap TOC depth via `page.toc_max_level` frontmatter (default: h5).
    // Also skip any heading inside a `.no-toc` container (e.g. the inline
    // question summary at the top of interview-style posts).
    const maxLevel = Math.max(2, Math.min(6, parseInt(
      document.querySelector('.post-toc')?.dataset.maxLevel || '5', 10)));
    const levelSel = [];
    for (let l = 2; l <= maxLevel; l++) levelSel.push(`.post-content h${l}`);
    const SELECTOR = levelSel.join(', ');
    const headings = Array.from(document.querySelectorAll(SELECTOR))
      .filter(h => h.id && !h.closest('.no-toc'));
    const tocPanel = document.querySelector('.post-toc');
    const toggle = document.querySelector('.toc-toggle');
    const backdrop = document.querySelector('.toc-backdrop');
    const progress = document.querySelector('.reading-progress');
    const backToTop = document.querySelector('.back-to-top');
    const article = document.querySelector('.post-content');

    // --- Reading progress + back-to-top visibility ---
    if (progress && article) {
      const updateProgress = () => {
        const articleTop = article.getBoundingClientRect().top + window.scrollY;
        const articleHeight = article.offsetHeight;
        const viewportBottom = window.scrollY + window.innerHeight;
        const read = Math.max(0, Math.min(articleHeight, viewportBottom - articleTop));
        const pct = articleHeight > 0 ? (read / articleHeight) * 100 : 0;
        progress.style.transform = `scaleX(${pct / 100})`;
        if (backToTop) {
          backToTop.classList.toggle('visible', window.scrollY > 600);
        }
      };
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
      updateProgress();
    }

    // --- Back-to-top wiring ---
    if (backToTop) {
      backToTop.hidden = false;
      backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    // --- Heading anchor links ---
    // Anchor every h2-h5 in the article body (regardless of TOC depth cap),
    // but skip anything inside .no-toc (e.g. the inline question summary).
    document.querySelectorAll(
      '.post-content h2, .post-content h3, .post-content h4, .post-content h5'
    ).forEach(h => {
      if (!h.id || h.closest('.no-toc')) return;
      const anchor = document.createElement('a');
      anchor.href = '#' + h.id;
      anchor.className = 'heading-anchor';
      anchor.setAttribute('aria-label', 'Permalink');
      anchor.textContent = '#';
      h.appendChild(anchor);
    });

    // --- Code copy buttons ---
    document.querySelectorAll('.post-content .highlight').forEach(block => {
      const pre = block.querySelector('pre');
      if (!pre) return;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'code-copy';
      btn.setAttribute('aria-label', '复制代码');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="8" height="10" rx="1.5"/><path d="M4 4V3a1 1 0 011-1h6a1 1 0 011 1v1"/></svg><span>复制</span>';
      block.appendChild(btn);
      btn.addEventListener('click', async () => {
        const text = pre.textContent || '';
        try {
          await navigator.clipboard.writeText(text);
          btn.classList.add('copied');
          btn.querySelector('span').textContent = '已复制';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.querySelector('span').textContent = '复制';
          }, 1800);
        } catch (e) {
          btn.querySelector('span').textContent = '失败';
        }
      });
    });

    // --- TOC: bail if too few headings ---
    if (headings.length < 4) {
      tocPanel?.remove();
      toggle?.remove();
      backdrop?.remove();
      return;
    }

    // --- TOC: build nested tree from heading levels ---
    function buildTree(items) {
      const root = { level: 1, children: [] };
      const stack = [root];
      for (const h of items) {
        const level = parseInt(h.tagName.charAt(1), 10);
        const node = { level, heading: h, children: [] };
        while (stack[stack.length - 1].level >= level) stack.pop();
        stack[stack.length - 1].children.push(node);
        stack.push(node);
      }
      return root.children;
    }

    const linkById = new Map();
    const liById = new Map();

    function renderTree(nodes) {
      const ul = document.createElement('ul');
      for (const node of nodes) {
        const li = document.createElement('li');
        li.className = 'toc-h' + node.level;
        liById.set(node.heading.id, li);

        const row = document.createElement('div');
        row.className = 'toc-row';

        const hasChildren = node.children.length > 0;
        if (hasChildren) {
          const chev = document.createElement('button');
          chev.type = 'button';
          chev.className = 'toc-chevron';
          chev.setAttribute('aria-label', '展开 / 折叠');
          chev.innerHTML = '<svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg>';
          chev.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            li.classList.toggle('expanded');
          });
          row.appendChild(chev);
        } else {
          const spacer = document.createElement('span');
          spacer.className = 'toc-spacer';
          row.appendChild(spacer);
        }

        const a = document.createElement('a');
        a.href = '#' + node.heading.id;
        a.textContent = node.heading.textContent.replace(/#\s*$/, '');
        // Clicking a parent link also expands its children for context
        if (hasChildren) {
          a.addEventListener('click', () => li.classList.add('expanded'));
        }
        row.appendChild(a);
        linkById.set(node.heading.id, a);

        li.appendChild(row);
        if (hasChildren) li.appendChild(renderTree(node.children));
        ul.appendChild(li);
      }
      return ul;
    }

    const tocNav = document.getElementById('toc');
    tocNav.appendChild(renderTree(buildTree(headings)));

    // --- Scroll-spy with auto-expand + auto-scroll ---
    let activeLink = null;
    const expandAncestors = (a) => {
      let el = a.closest('li');
      while (el) {
        el.classList.add('expanded');
        el = el.parentElement?.closest('li');
      }
    };
    const ensureLinkVisible = (a) => {
      const cRect = tocPanel.getBoundingClientRect();
      const lRect = a.getBoundingClientRect();
      const margin = 24;
      if (lRect.top < cRect.top + margin) {
        tocPanel.scrollBy({ top: lRect.top - cRect.top - margin, behavior: 'smooth' });
      } else if (lRect.bottom > cRect.bottom - margin) {
        tocPanel.scrollBy({ top: lRect.bottom - cRect.bottom + margin, behavior: 'smooth' });
      }
    };
    const setActive = (a) => {
      if (activeLink === a) return;
      if (activeLink) activeLink.classList.remove('active');
      if (a) {
        a.classList.add('active');
        expandAncestors(a);
        ensureLinkVisible(a);
      }
      activeLink = a;
    };
    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => a.target.offsetTop - b.target.offsetTop);
      if (visible.length > 0) {
        setActive(linkById.get(visible[0].target.id));
      }
    }, { rootMargin: '-90px 0px -75% 0px', threshold: 0 });
    headings.forEach(h => observer.observe(h));

    // --- Mobile drawer ---
    if (toggle) toggle.hidden = false;
    if (backdrop) backdrop.hidden = false;
    const openDrawer = () => {
      tocPanel.classList.add('open');
      backdrop.classList.add('show');
      toggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    };
    const closeDrawer = () => {
      tocPanel.classList.remove('open');
      backdrop.classList.remove('show');
      toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    };
    toggle?.addEventListener('click', () => {
      tocPanel.classList.contains('open') ? closeDrawer() : openDrawer();
    });
    backdrop?.addEventListener('click', closeDrawer);
    tocNav.addEventListener('click', (e) => {
      if (e.target.tagName === 'A' && window.matchMedia('(max-width: 1100px)').matches) {
        closeDrawer();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && tocPanel.classList.contains('open')) closeDrawer();
    });

    // --- Desktop collapse/expand (>1100px only) ---
    const layout = document.querySelector('.post-layout');
    const collapseBtn = document.querySelector('.toc-collapse');
    const expandBtn = document.querySelector('.toc-expand');
    const STORAGE_KEY = 'toc-collapsed';
    const isDesktop = () => window.matchMedia('(min-width: 1101px)').matches;
    const applyCollapsed = (collapsed) => {
      if (!layout) return;
      layout.classList.toggle('toc-hidden', collapsed);
      if (expandBtn) expandBtn.hidden = !collapsed;
    };
    // Restore preference on load (only when desktop)
    if (isDesktop()) {
      try {
        if (localStorage.getItem(STORAGE_KEY) === '1') applyCollapsed(true);
      } catch (e) {}
    }
    collapseBtn?.addEventListener('click', () => {
      applyCollapsed(true);
      try { localStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
    });
    expandBtn?.addEventListener('click', () => {
      applyCollapsed(false);
      try { localStorage.setItem(STORAGE_KEY, '0'); } catch (e) {}
    });
  })();

  // === Mermaid diagrams (lazy-load only when present) ===
  (function () {
    const blocks = Array.from(document.querySelectorAll(
      '.post-content code.language-mermaid, .post-content pre > code.language-mermaid'
    ));
    if (blocks.length === 0) return;

    // Snapshot source text + wrapper before mutating DOM
    const pending = blocks.map(code => {
      const wrapper = code.closest('div.highlighter-rouge') || code.closest('pre');
      return { wrapper, source: code.textContent };
    }).filter(p => p.wrapper);

    if (pending.length === 0) return;

    import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs')
      .then(({ default: mermaid }) => {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'default',
          securityLevel: 'loose',
          fontFamily: 'inherit',
          flowchart: { curve: 'basis' },
        });
        pending.forEach(({ wrapper, source }) => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = source;
          wrapper.replaceWith(div);
        });
        return mermaid.run({ querySelector: '.post-content .mermaid' });
      })
      .catch(err => console.error('[mermaid] failed:', err));
  })();

  // === Image lightbox (medium-zoom, lazy) ===
  (function () {
    const images = document.querySelectorAll('.post-content img');
    if (images.length === 0) return;
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/medium-zoom@1/dist/medium-zoom.min.js';
    script.async = true;
    script.onload = () => {
      window.mediumZoom?.('.post-content img', {
        background: 'rgba(15, 15, 15, 0.92)',
        margin: 48,
        scrollOffset: 0,
      });
    };
    document.body.appendChild(script);
  })();
</script>
