name: Daily Thought

on:
  issues:
    # Only "labeled": applying the `daily` label is the explicit publish action.
    # Listening to "opened" too would double-fire when an issue is created with
    # the label already selected (GitHub emits both events), producing a
    # duplicate entry. The script is also idempotent per issue as a backstop.
    types: [labeled]

# Only run when:
# 1) the label just applied is "daily", AND
# 2) the issue author is the repo owner (so random visitors can't publish
#    to the site even if they somehow get the label applied).
jobs:
  publish:
    if: |
      github.event.label.name == 'daily' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert issue to daily entry
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/daily_thought.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _daily/
          if [ -d assets/images/daily ]; then
            git add assets/images/daily/
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(daily): thought from issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with confirmation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "Published ✓  Will appear at /daily/ once GitHub Pages rebuilds."
