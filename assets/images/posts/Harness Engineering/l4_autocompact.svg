<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="906" viewBox="0 0 1240 906" font-family="'Noto Sans CJK SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9B1C1C"/>
      <stop offset="1" stop-color="#C62828"/>
    </linearGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9 Z" fill="#D93025"/>
    </marker>
    <style>
      .t{font-size:16px;fill:#2B2B2E}
      .mut{font-size:15px;fill:#8A8F98}
      .ttl{font-size:19px;font-weight:700;fill:#1F3A5F}
      .lbl{font-size:18px;font-weight:700}
      .bar{font-size:25px;font-weight:700;fill:#ffffff}
      .pill{font-size:15px;fill:#5A5F66}
      .hd{font-size:18px;font-weight:700}
    </style>
  </defs>

  <rect width="1240" height="906" fill="#ffffff"/>

  <rect x="30" y="20" width="1180" height="60" rx="10" fill="url(#bar)"/>
  <text x="620" y="60" text-anchor="middle" class="bar">L4: autoCompact — LLM 全量摘要</text>

  <rect x="30" y="100" width="1180" height="92" rx="12" fill="#FDECEC" stroke="#F0C4C4" stroke-width="1.5"/>
  <text x="58" y="141" class="lbl" fill="#C0392B">触发条件</text>
  <text x="182" y="135" class="t">前三层预处理全跑完,估算 token &gt; contextWindow - maxOutputTokens - 13_000。</text>
  <text x="182" y="169" class="t">先尝试 sessionMemoryCompact(用已有记忆做轻量摘要),不足才调 LLM。</text>

  <rect x="30" y="215" width="373" height="272" rx="14" fill="#FFFFFF" stroke="#BCC4CF" stroke-width="1.2"/>
  <text x="216" y="262" text-anchor="middle" class="ttl">步骤 1:保存 transcript</text>
  <text x="55" y="312" class="t">完整对话写入 .transcripts/</text>
  <text x="55" y="345" class="t">JSONL 格式,一行一条消息</text>
  <text x="55" y="378" class="t">文件名:transcript_{timestamp}.jsonl</text>
  <text x="55" y="414" class="mut">信息没有丢失,只是移出活跃区</text>

  <rect x="433" y="215" width="373" height="272" rx="14" fill="#FFFFFF" stroke="#BCC4CF" stroke-width="1.2"/>
  <text x="619" y="262" text-anchor="middle" class="ttl">步骤 2:LLM 生成摘要</text>
  <text x="458" y="308" class="t">把对话历史发给 LLM</text>
  <text x="458" y="340" class="t">摘要需包含 9 个部分:</text>
  <text x="458" y="368" class="mut">请求·概念·文件·错误·解决</text>
  <text x="458" y="394" class="mut">用户消息·待办·当前·下一步</text>
  <text x="458" y="426" class="t">只生成一次</text>

  <rect x="836" y="215" width="373" height="272" rx="14" fill="#FDECEC" stroke="#D93025" stroke-width="2"/>
  <text x="1022" y="262" text-anchor="middle" class="ttl">步骤 3:替换消息列表</text>
  <text x="861" y="312" class="t">所有旧消息 → 1 条摘要</text>
  <text x="861" y="345" class="t">模型从摘要继续工作</text>
  <text x="861" y="378" class="t">附带 recently_read 文件列表</text>
  <path d="M861 401 L869 415 L853 415 Z" fill="none" stroke="#D93025" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="861" y1="406" x2="861" y2="411" stroke="#D93025" stroke-width="1.5"/>
  <circle cx="861" cy="414" r="0.9" fill="#D93025"/>
  <text x="877" y="418" class="t" fill="#C0392B">这是无法恢复的操作</text>

  <line x1="406" y1="351" x2="430" y2="351" stroke="#D93025" stroke-width="5" marker-end="url(#ah)"/>
  <line x1="809" y1="351" x2="833" y2="351" stroke="#D93025" stroke-width="5" marker-end="url(#ah)"/>

  <rect x="30" y="515" width="480" height="272" rx="14" fill="#FFFFFF" stroke="#BCC4CF" stroke-width="1.2"/>
  <text x="270" y="558" text-anchor="middle" class="hd" fill="#2B2B2E">压缩前 messages</text>
  <g class="pill">
    <rect x="52" y="585" width="78" height="36" rx="7" fill="#EAEBEE"/><text x="91" y="609" text-anchor="middle">user</text>
    <rect x="144" y="585" width="92" height="36" rx="7" fill="#EAEBEE"/><text x="190" y="609" text-anchor="middle">assistant</text>
    <rect x="250" y="585" width="78" height="36" rx="7" fill="#EAEBEE"/><text x="289" y="609" text-anchor="middle">user</text>
    <rect x="342" y="585" width="92" height="36" rx="7" fill="#EAEBEE"/><text x="388" y="609" text-anchor="middle">assistant</text>
    <rect x="448" y="585" width="50" height="36" rx="7" fill="#EAEBEE"/><text x="473" y="609" text-anchor="middle">user</text>
  </g>
  <text x="270" y="742" text-anchor="middle" class="mut">~180 条消息,占 62K token</text>

  <rect x="545" y="515" width="665" height="272" rx="14" fill="#FDECEC" stroke="#D93025" stroke-width="2"/>
  <text x="877" y="558" text-anchor="middle" class="hd" fill="#C0392B">压缩后 messages</text>
  <rect x="580" y="582" width="595" height="84" rx="10" fill="#FCE0E0" stroke="#E89B9B" stroke-width="1.2"/>
  <text x="877" y="617" text-anchor="middle" class="t">[Compacted] 摘要:目标 → 创建 hello.py …</text>
  <text x="877" y="648" text-anchor="middle" class="t">最近文件:hello.py, README.md …</text>
  <text x="877" y="742" text-anchor="middle" class="mut">~1 条消息,占 1K token</text>

  <line x1="513" y1="651" x2="541" y2="651" stroke="#D93025" stroke-width="5" marker-end="url(#ah)"/>

  <rect x="30" y="815" width="1180" height="66" rx="12" fill="#F3F5F8" stroke="#DDE2E8" stroke-width="1.2"/>
  <text x="58" y="856" class="lbl" fill="#2B2B2E">熔断器:</text>
  <text x="165" y="856" class="t">连续 autocompact 失败 3 次 → 停止重试。防止上下文不可恢复时反复浪费 API 调用。</text>
</svg>
