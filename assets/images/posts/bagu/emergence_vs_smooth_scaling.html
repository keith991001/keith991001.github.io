<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary);">
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 3px; background: #2a78d6; border-radius:2px;"></span>平滑提升（多数能力）</span>
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 0; border-top: 3px dashed #e34948;"></span>涌现跳变（如多步推理）</span>
</div>
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="emgChart" role="img" aria-label="折线图对比：平滑能力随模型规模逐步上升；涌现能力在临界规模前接近随机水平，跨过阈值后急剧跃升。">平滑能力随规模稳步上升；涌现能力在临界点前几乎为零，之后突然跃升。</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  var css = getComputedStyle(document.documentElement);
  var muted = css.getPropertyValue('--text-muted') || '#898781';
  var isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  var grid = isDark ? '#2c2c2a' : '#e1e0d9';
  var labels = ['1e20','1e21','1e22','1e23','1e24','1e25'];
  var smooth = [12, 24, 37, 52, 66, 78];
  var emergent = [2, 3, 4, 8, 45, 72];
  new Chart(document.getElementById('emgChart'), {
    type: 'line',
    data: { labels: labels, datasets: [
      { label: '平滑提升', data: smooth, borderColor: '#2a78d6', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#2a78d6', tension: 0.3 },
      { label: '涌现跳变', data: emergent, borderColor: '#e34948', borderWidth: 2, borderDash: [6,4], pointRadius: 3, pointBackgroundColor: '#e34948', tension: 0.3 }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: '训练计算量 / 模型规模（对数）', color: muted }, grid: { display: false }, ticks: { color: muted } },
        y: { min: 0, max: 100, title: { display: true, text: '任务准确率 (%)', color: muted }, grid: { color: grid }, ticks: { color: muted, callback: function(v){ return v + '%'; } } }
      }
    }
  });
})();
</script>
