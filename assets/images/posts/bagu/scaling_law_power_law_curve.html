<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary);">
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 3px; background: #2a78d6; border-radius:2px;"></span>测试损失随计算量下降（对数-对数坐标）</span>
</div>
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="scaleChart" role="img" aria-label="对数-对数坐标下的折线图：随着计算量按数量级增加，测试损失沿一条近似直线平滑下降，体现幂律关系。">在对数坐标下，损失随计算量增加近似直线下降，即幂律关系。</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  var css = getComputedStyle(document.documentElement);
  var muted = css.getPropertyValue('--text-muted') || '#898781';
  var isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  var grid = isDark ? '#2c2c2a' : '#e1e0d9';
  var exps = [3,4,5,6,7,8,9,10];
  var labels = exps.map(function(e){ return '1e'+e; });
  var data = exps.map(function(e){ return +(4.2 * Math.pow(10, -0.08*(e-3))).toFixed(3); });
  new Chart(document.getElementById('scaleChart'), {
    type: 'line',
    data: { labels: labels, datasets: [{ label: '测试损失', data: data, borderColor: '#2a78d6', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#2a78d6', tension: 0.1 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: '计算量 C（FLOPs，对数）', color: muted }, grid: { display: false }, ticks: { color: muted } },
        y: { type: 'logarithmic', title: { display: true, text: '测试损失（对数）', color: muted }, grid: { color: grid }, ticks: { color: muted } }
      }
    }
  });
})();
</script>
