<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary);">
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 3px; background: #2a78d6; border-radius:2px;"></span>ReLU</span>
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 0; border-top: 3px dashed #1baf7a;"></span>GELU</span>
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 16px; height: 0; border-top: 3px dotted #eda100;"></span>SiLU / Swish</span>
</div>
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="actChart" role="img" aria-label="折线图：ReLU 在负区间恒为零、正区间为直线且零点有折角；GELU 和 SiLU 在零点附近平滑弯曲，负区间有小幅负值后回归零，整体光滑可导。">ReLU 在零点有折角、负区恒零；GELU 与 SiLU 处处平滑，负区允许小负值。</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  var css = getComputedStyle(document.documentElement);
  var muted = css.getPropertyValue('--text-muted') || '#898781';
  var isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  var grid = isDark ? '#2c2c2a' : '#e1e0d9';
  var xs = [];
  for (var x = -5; x <= 5.0001; x += 0.5) xs.push(+x.toFixed(1));
  function erf(z){ var t=1/(1+0.3275911*Math.abs(z)); var y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-z*z); return z>=0?y:-y; }
  var relu = xs.map(function(x){ return Math.max(0,x); });
  var gelu = xs.map(function(x){ return +(x*0.5*(1+erf(x/Math.SQRT2))).toFixed(3); });
  var silu = xs.map(function(x){ return +(x/(1+Math.exp(-x))).toFixed(3); });
  new Chart(document.getElementById('actChart'), {
    type: 'line',
    data: { labels: xs, datasets: [
      { label: 'ReLU', data: relu, borderColor: '#2a78d6', borderWidth: 2, pointRadius: 0 },
      { label: 'GELU', data: gelu, borderColor: '#1baf7a', borderWidth: 2, borderDash: [6,4], pointRadius: 0 },
      { label: 'SiLU / Swish', data: silu, borderColor: '#eda100', borderWidth: 2, borderDash: [2,3], pointRadius: 0 }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: '输入 x', color: muted }, grid: { color: grid }, ticks: { color: muted, maxTicksLimit: 11 } },
        y: { title: { display: true, text: '输出', color: muted }, grid: { color: grid }, ticks: { color: muted } }
      }
    }
  });
})();
</script>
