  <div class="about-section">
    <h2>Recent Visitors</h2>
    <p style="color: #666; font-size: 0.9rem; margin-bottom: 1rem;">
      Showing approximate city-level locations of recent visitors.
      No IP addresses are stored; data auto-expires after 30 days.
    </p>
    <div id="visitor-map" style="height: 400px; border-radius: 8px; 
  border: 1px solid #e5e5e5;"></div>
    <p id="visitor-count" style="text-align: center; color: #999; 
  font-size: 0.85rem; margin-top: 0.5rem;">
      Loading…
    </p>
  </div>
  
  <link rel="stylesheet" 
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script 
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
  (function () {
    const WORKER_URL =
  'https://visitor-map-worker.keith991001.workers.dev';

    // ① 上报"我来了"——不用等返回，失败也不影响地图展示
    fetch(WORKER_URL, { method: 'POST' }).catch(() => {});
  
    // ② 初始化地图（默认视角：世界地图，居中在赤道附近）
    const map = L.map('visitor-map', { worldCopyJump: true
  }).setView([20, 0], 2);
  
    // ③ 加底图（OpenStreetMap，免费、无 API key）
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map);
  
    // ④ 拉取最近访客 → 画到地图上
    fetch(WORKER_URL)
      .then(r => r.json())
      .then(visits => {
        visits.forEach(v => {
          if (!v.latitude || !v.longitude) return;
          L.circleMarker([v.latitude, v.longitude], {
            radius: 7,
            fillColor: '#3b82f6',
            color: '#1e40af',
            weight: 1.5,
            fillOpacity: 0.6,
          })
            .bindPopup(
              `<strong>${v.city || 'Unknown'}, ${v.country ||
  ''}</strong><br>` +
              `<small>${new Date(v.timestamp).toLocaleString()}</small>`
            )
            .addTo(map);
        });
  
        const countEl = document.getElementById('visitor-count');
        if (countEl) {
          countEl.textContent = visits.length === 0
            ? 'Be the first visitor!'
            : `Showing the last ${visits.length} visitor${visits.length
  === 1 ? '' : 's'}`;
        }
      })
      .catch(err => {
        console.error('Failed to load visitors:', err);
        const countEl = document.getElementById('visitor-count');
        if (countEl) countEl.textContent = 'Unable to load visitors';
      });
  })();
  </script>
