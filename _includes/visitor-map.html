  <section class="visitor-section">
    <h2 class="visitor-title">Recent Visitors</h2>
    <p class="visitor-privacy">
      Showing approximate country-level locations of visitors. No IP addresses are stored.
    </p>

    <div class="visitor-choropleth" id="visitor-choropleth">
      {% include world-countries.svg %}
    </div>

    <div class="visitor-scale">
      <span>0</span>
      <div class="visitor-scale-bar"></div>
      <span id="visitor-scale-max">—</span>
    </div>

    <table class="visitor-table">
      <thead>
        <tr>
          <th>Country</th>
          <th class="num">Visits</th>
          <th class="num">Locations</th>
          <th>Last Visit</th>
        </tr>
      </thead>
      <tbody id="visitor-table-body">
        <tr><td colspan="4" class="visitor-empty">Loading…</td></tr>
      </tbody>
    </table>

    <p id="visitor-count" class="visitor-total">Loading…</p>
  </section>

  <style>
    .visitor-section {
      margin: 3rem 0 4rem;
    }
    .visitor-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      margin: 0 0 0.4rem;
      letter-spacing: -0.01em;
    }
    .visitor-privacy {
      color: #888;
      font-size: 0.9rem;
      margin: 0 0 1rem;
    }
    .visitor-choropleth {
      width: 100%;
      margin: 0 0 0.6rem;
    }
    .visitor-choropleth svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .visitor-choropleth svg path {
      fill: #f3f4f6;
      stroke: #d4d4d8;
      stroke-width: 0.3;
      transition: fill 0.3s ease;
    }
    .visitor-scale {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }
    .visitor-scale-bar {
      width: 220px;
      height: 6px;
      background: linear-gradient(to right, #dbeafe, #1e40af);
      border-radius: 3px;
    }
    .visitor-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .visitor-table thead {
      border-bottom: 1px solid #e5e7eb;
    }
    .visitor-table th {
      text-align: left;
      padding: 0.6rem 0.5rem;
      font-weight: 600;
      color: #888;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .visitor-table th.num {
      text-align: right;
    }
    .visitor-table td {
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    .visitor-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .visitor-table tr:last-child td {
      border-bottom: none;
    }
    .visitor-table .row-flag {
      font-size: 1.3rem;
      margin-right: 0.6rem;
      vertical-align: middle;
    }
    .visitor-table .row-country {
      font-weight: 500;
      color: #111;
    }
    .visitor-table .row-time {
      color: #888;
      font-size: 0.88rem;
    }
    .visitor-empty {
      text-align: center;
      color: #999;
      padding: 1.5rem 0;
    }
    .visitor-total {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    @media (max-width: 600px) {
      .visitor-table { font-size: 0.82rem; }
      .visitor-table th,
      .visitor-table td { padding: 0.5rem 0.3rem; }
      .visitor-table .row-flag { font-size: 1.1rem; margin-right: 0.3rem; }
      .visitor-table .row-country { font-size: 0.82rem; }
    }
  </style>

  <script>
  (function () {
    const WORKER_URL = 'https://visitor-map-worker.keith991001.workers.dev';

    // ① 上报"我来了"
    fetch(WORKER_URL, { method: 'POST' }).catch(() => {});

    // —— 工具函数 ——
    function flagFor(code) {
      if (!code || code.length !== 2 || code === 'XX') return '🌍';
      const points = code.toUpperCase().split('').map(c => 0x1F1E6 - 65 + c.charCodeAt(0));
      return String.fromCodePoint(...points);
    }

    let regionNames;
    try { regionNames = new Intl.DisplayNames(['en'], { type: 'region' }); } catch (e) {}
    function nameFor(code) {
      if (!code || code === 'XX') return 'Unknown';
      try { return regionNames ? regionNames.of(code) : code; } catch (e) { return code; }
    }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
      if (s < 60)       return 'just now';
      if (s < 3600)     return Math.floor(s / 60) + 'm ago';
      if (s < 86400)    return Math.floor(s / 3600) + 'h ago';
      if (s < 2592000)  return Math.floor(s / 86400) + 'd ago';
      if (s < 31536000) return Math.floor(s / 2592000) + 'mo ago';
      return Math.floor(s / 31536000) + 'y ago';
    }

    // 非线性映射：1 个访客就有明显颜色，前期变化快，到 100 后饱和
    // 用 sqrt(visits)/10 配 0.3 的基线偏移
    function colorFor(visits) {
      if (visits === 0) return '#f3f4f6';
      const capped = Math.min(visits, 100);
      const t = 0.3 + (Math.sqrt(capped) / 10) * 0.7;  // 1→0.37, 10→0.521, 100→1.0
      const lightness = 80 - t * 50;                    // 1→61.5%, 10→53.9%, 100→30%
      return 'hsl(217, 91%, ' + lightness + '%)';
    }

    // ② 拉取访客 → 聚合 → 渲染地图 + 表格
    fetch(WORKER_URL)
      .then(r => r.json())
      .then(visits => {
        if (!visits || visits.length === 0) {
          document.getElementById('visitor-table-body').innerHTML =
            '<tr><td colspan="4" class="visitor-empty">Be the first visitor!</td></tr>';
          document.getElementById('visitor-count').textContent = '';
          return;
        }

        // 按国家聚合
        const byCountry = {};
        visits.forEach(v => {
          const code = v.country || 'XX';
          if (!byCountry[code]) {
            byCountry[code] = {
              code: code,
              visits: 0,
              cities: new Set(),
              lastTimestamp: v.timestamp,
            };
          }
          const c = byCountry[code];
          c.visits += 1;
          if (v.city) c.cities.add(v.city);
          if (new Date(v.timestamp) > new Date(c.lastTimestamp)) {
            c.lastTimestamp = v.timestamp;
          }
        });

        const rows = Object.values(byCountry).sort((a, b) => b.visits - a.visits);

        // 给 SVG 国家填色 + 小国家额外加圆点 marker
        const svgRoot = document.querySelector('#visitor-choropleth svg');
        if (svgRoot) {
          const SMALL_THRESHOLD = 15;  // SVG 单位，小于此宽度的国家加圆点
          rows.forEach(c => {
            const color = colorFor(c.visits);
            const paths = [];

            // 按 id 匹配（单形状国家）
            const byId = svgRoot.querySelector('path[id="' + c.code + '"]');
            if (byId) paths.push(byId);

            // 按 class 匹配（多形状国家）
            const fullName = nameFor(c.code);
            if (fullName && fullName !== c.code) {
              svgRoot.querySelectorAll('path[class~="' + fullName + '"]').forEach(p => paths.push(p));
            }

            // 填色
            paths.forEach(p => { p.style.fill = color; });

            // 小国家：算 bbox，太小就在中心加圆点
            if (paths.length > 0) {
              const maxWidth = Math.max.apply(null, paths.map(p => p.getBBox().width));
              if (maxWidth < SMALL_THRESHOLD) {
                const b = paths[0].getBBox();
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('cx', b.x + b.width / 2);
                dot.setAttribute('cy', b.y + b.height / 2);
                dot.setAttribute('r', 6);
                dot.setAttribute('fill', color);
                dot.setAttribute('stroke', '#fff');
                dot.setAttribute('stroke-width', 1.2);
                svgRoot.appendChild(dot);
              }
            }
          });
        }

        // 更新色阶（始终显示 "1 to 100+"，颜色固定不随数据变）
        document.getElementById('visitor-scale-max').textContent = '100+';

        // 渲染表格
        const tbody = document.getElementById('visitor-table-body');
        tbody.innerHTML = rows.map(c =>
          '<tr>' +
            '<td>' +
              '<span class="row-flag">' + flagFor(c.code) + '</span>' +
              '<span class="row-country">' + nameFor(c.code) + '</span>' +
            '</td>' +
            '<td class="num">' + c.visits + '</td>' +
            '<td class="num">' + c.cities.size + '</td>' +
            '<td class="row-time">' + timeAgo(c.lastTimestamp) + '</td>' +
          '</tr>'
        ).join('');

        const total = visits.length;
        const countries = rows.length;
        document.getElementById('visitor-count').textContent =
          total + ' visits from ' + countries + ' countr' + (countries === 1 ? 'y' : 'ies');
      })
      .catch(err => {
        console.error('Failed to load visitors:', err);
        document.getElementById('visitor-table-body').innerHTML =
          '<tr><td colspan="4" class="visitor-empty">Unable to load visitors</td></tr>';
      });
  })();
  </script>
