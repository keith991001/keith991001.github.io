title: Ke Yu
description: Data Scientist & AI Researcher at The University of Tokyo
url: "https://keith991001.github.io"
baseurl: ""

markdown: kramdown
permalink: /thoughts/:year/:month/:title/

collections:
  bookmarks:
    output: false
  projects:
    output: false

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

plugins:
  - jekyll-seo-tag

# 分类配置（决定 Bookmarks / Thoughts 页顶部的 chip 顺序）
# 未来想加新分类，在这里加一行，所有 chips 自动出现
bookmark_categories:
  - Tool
  - AI
  - Finance
  - Other

thought_categories:
  - Computer
  - AI
  - Finance
  - Daily
